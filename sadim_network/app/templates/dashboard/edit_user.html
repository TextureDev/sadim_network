<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">

{% extends "base.html" %}

{% block title %}تعديل المستخدم | سديم{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard/edit_user.css') }}">

<div class="edit-user-container">
    <h2 class="edit-title">
        <i class="fas fa-user-edit"></i> تعديل المستخدم: {{ user.username }}
    </h2>
    
    <form method="POST">
        <div class="info-item">
            <span class="info-label">صورة الملف الشخصي</span>
            <span class="info-value">
                {% if user.profile_image %}
                    <img src="{{ url_for('static', filename='uploads/' + user.profile_image) }}?v=1" width="80" style="border-radius: 50%;">
                {% else %}
                    <img src="{{ url_for('static', filename='uploads/default.png') }}" width="80" style="border-radius: 50%;">
                {% endif %}
            </span>
        </div>
        <div class="nebula-form-group">
            <label for="name"><i class="fas fa-id-card"></i> الاسم الكامل</label>
            <input type="text" class="nebula-input" id="name" name="name" value="{{ user.name }}" required>
        </div>

        <div class="nebula-form-group">
            <label for="email"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" class="nebula-input" id="email" name="email" value="{{ user.email }}" required>
        </div>

        <div class="nebula-form-group">
            <label for="password_hash"><i class="fas fa-lock"></i> كلمة المرور الجديدة</label>
            <input type="password" class="nebula-input" id="password_hash" name="password_hash" value="{{ user.password_hash }}" placeholder="اتركها فارغة لعدم التغيير">
        </div>

        <div class="nebula-form-group">
            <label for="role"><i class="fas fa-user-tag"></i> مستوى الصلاحية</label>
            <select class="nebula-select" id="role" name="role">
                <option value="user" {% if user.role == 'user' %}selected{% endif %}>👤 مستخدم</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>🛡️ أدمن (مدير نظام)</option>
            </select>
        </div>

        <div class="nebula-form-group">
         <label><i class="fas fa-check-circle"></i> حالة التحقق من البريد</label>
           <div class="verification-wrapper">
               <span class="verification-status-text">تم التحقق من الحساب</span>
               <label class="switch-container">
                   <input type="checkbox" id="is_verified" name="is_verified" class="nebula-checkbox" {% if user.is_verified %}checked{% endif %}>
                   <div class="toggle-switch"></div>
               </label>
           </div>
        </div>
        <div class="nebula-form-group">
            <label for="status"><i class="fas fa-toggle-on"></i> حالة الحساب</label>
            <select class="nebula-select" id="status" name="status">
                <option value="active" {% if user.status == 'active' %}selected{% endif %}>🟢 نشط (Active)</option>
                <option value="suspended" {% if user.status == 'suspended' %}selected{% endif %}>🟡 معلق (Suspended)</option>
                <option value="deleted" {% if user.status == 'deleted' %}selected{% endif %}>🔴 محذوف (Soft Delete)</option>
            </select>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-save">
                <i class="fas fa-save"></i> حفظ التغييرات
            </button>
            <a href="{{ url_for('admin.admin_users_list') }}" class="btn-cancel">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
