<!-- templates/dashboard/add_user.html -->
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard/add_user.css') }}">
    <title>إضافة مستخدم جديد</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">


<body>
    <div class="add-user-card">
        <h2>إضافة مستخدم جديد</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">
                 <i class="fas fa-info-circle"></i> {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <label class="nebula-label" for="name">الاسم الثلاثي:</label>
            <input type="text" class="nebula-input" id="name" name="name" placeholder="أدخل الاسم الكامل" required>

            <label class="nebula-label" for="username">اسم المستخدم (Username):</label>
            <input type="text" class="nebula-input" id="username" name="username" placeholder="مثال: ahmad_2024" required>

            <label class="nebula-label" for="email">البريد الإلكتروني:</label>
            <input type="email" class="nebula-input" id="email" name="email" placeholder="email@example.com" required>

            <label class="nebula-label" for="password">كلمة المرور:</label>
            <input type="password" class="nebula-input" id="password" name="password" placeholder="••••••••" required>
            <label class="nebula-label" for="is_verified">
                <input type="checkbox" id="is_verified" name="is_verified">
                تم التحقق من البريد الإلكتروني
            </label>
            <label class="nebula-label" for="role">صلاحية الوصول:</label>
            <select class="nebula-select" id="role" name="role" required>
                <option value="user">👤 مستخدم عادي</option>
                <option value="admin">🔐 مشرف نظام (Admin)</option>
            </select>

            <button type="submit" class="btn-nebula-submit">
                <i class="fas fa-user-plus"></i> تثبيت العضوية في سديم
            </button>
        </form>

        <a href="{{ url_for('admin.admin_users_list') }}" class="back-link">
            <i class="fas fa-arrow-right"></i> عودة إلى قائمة المستخدمين
        </a>
    </div>
</body>
