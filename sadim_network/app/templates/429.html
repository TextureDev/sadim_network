<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>429 - طلبات كثيرة | شبكة سديم</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #a0a09c;
      --border: rgba(0,0,0,0.12);
      --border-light: rgba(0,0,0,0.07);
      --accent: #E24B4A;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg-secondary: #242422;
        --text-primary: #f0efe8;
        --text-secondary: #888780;
        --text-tertiary: #555552;
        --border: rgba(255,255,255,0.12);
        --border-light: rgba(255,255,255,0.07);
      }
    }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border-light) 1px, transparent 1px),
        linear-gradient(90deg, var(--border-light) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sadim-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2.5rem;
      text-decoration: none;
    }

    .sadim-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .code {
      font-size: 96px;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 0.75rem;
      letter-spacing: -4px;
    }

    .code span { color: var(--accent); }

    .title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.8;
      max-width: 400px;
      margin: 0 auto 2.5rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background: var(--text-primary);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary:hover { opacity: 0.8; }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-secondary:hover { background: var(--bg-secondary); }

    .footer {
      margin-top: 3rem;
      font-size: 12px;
      color: var(--text-tertiary);
    }

    .footer a {
      color: var(--text-tertiary);
      text-decoration: none;
      border-bottom: 0.5px solid var(--border-light);
    }

    .footer a:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="content">

    <a href="/" class="sadim-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="var(--border)" stroke-width="0.5"/>
        <circle cx="14" cy="14" r="3" fill="var(--text-primary)" opacity="0.9"/>
        <circle cx="14" cy="5"  r="1.5" fill="var(--text-tertiary)"/>
        <circle cx="14" cy="23" r="1.5" fill="var(--text-tertiary)"/>
        <circle cx="5"  cy="14" r="1.5" fill="var(--text-tertiary)"/>
        <circle cx="23" cy="14" r="1.5" fill="var(--text-tertiary)"/>
        <circle cx="7.5"  cy="7.5"  r="1" fill="var(--text-tertiary)" opacity="0.5"/>
        <circle cx="20.5" cy="7.5"  r="1" fill="var(--text-tertiary)" opacity="0.5"/>
        <circle cx="7.5"  cy="20.5" r="1" fill="var(--text-tertiary)" opacity="0.5"/>
        <circle cx="20.5" cy="20.5" r="1" fill="var(--text-tertiary)" opacity="0.5"/>
      </svg>
      <span class="sadim-name">شبكة سديم</span>
    </a>

    <div class="badge">
      <span class="dot"></span>
      طلبات كثيرة
    </div>

    <div class="code">4<span>2</span>9</div>
    <div class="title">تجاوزت الحد المسموح به</div>
    <p class="desc">لقد أرسلت عدداً كبيراً من الطلبات في وقت قصير.<br>انتظر لحظة ثم حاول مجدداً.</p>

    <div class="actions">
      <button class="btn-primary" onclick="window.location.reload()">حاول مجدداً</button>
      <a href="/" class="btn-secondary">العودة للرئيسية</a>
    </div>

    <div class="footer">
      <a href="https://sadim.cloud">sadim.cloud</a>
    </div>

  </div>
</body>
</html>
