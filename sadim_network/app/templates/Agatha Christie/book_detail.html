<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
  <title>{{ book.title }} | المكتبة الملكية</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d0b08;
      --bg-secondary: #161410;
      --bg-card: #1a1713;
      --gold: #c9a84c;
      --gold-light: #e2c97e;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #ede8df;
      --text-secondary: #9a9080;
      --text-muted: #5a5248;
      --border: rgba(201,168,76,0.15);
      --border-light: rgba(255,255,255,0.06);
    }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 0.5px solid var(--border);
    }

    .brand {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      text-decoration: none;
      letter-spacing: 0.15em;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 14px;
      border: 0.5px solid var(--border-light);
      border-radius: 99px;
      transition: color 0.15s, border-color 0.15s;
    }

    .back-btn:hover {
      color: var(--gold);
      border-color: var(--border);
    }

    /* MAIN LAYOUT */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .book-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 3rem;
      align-items: start;
    }

    @media (max-width: 600px) {
      .book-layout { grid-template-columns: 1fr; gap: 2rem; }
      .cover-wrap { text-align: center; }
    }

    /* COVER */
    .cover-wrap {
      position: sticky;
      top: 2rem;
    }

    .cover-wrap img {
      width: 100%;
      max-width: 220px;
      border-radius: 6px;
      border: 0.5px solid var(--border);
      display: block;
    }

    .download-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1rem;
      padding: 8px;
      background: var(--gold-dim);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--gold-light);
    }

    /* CONTENT */
    .book-meta {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .book-author {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .book-title {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 1.5rem;
      opacity: 0.5;
    }

    .book-desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 2;
      margin-bottom: 2.5rem;
    }

    /* ACTIONS */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gold);
      color: #0d0b08;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 14px;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn-download:hover { opacity: 0.85; }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-back:hover {
      border-color: var(--border);
      color: var(--text);
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      border-top: 0.5px solid var(--border-light);
      font-size: 12px;
      color: var(--text-muted);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 0.5px solid var(--border-light);
    }
  </style>
</head>
<body>
    
  <div class="grid-bg"></div>

  <header>
    <a href="{{ url_for('loading_bp.landing_page') }}" class="brand">SADEEM</a>
    <a href="{{ url_for('Library_Agatha.agatha_christie') }}" class="back-btn">
      <i class="fa-solid fa-arrow-right" style="font-size:12px;"></i>
      العودة للمكتبة
    </a>
  </header>

  <div class="container">
    <div class="book-layout">

      <div class="cover-wrap">
        <img 
          src="{{ url_for('Library_Agatha.static', filename='uploads/' + book['cover_path']) }}?v={{ book['id'] }}" 
          alt="{{ book['title'] }}"
        >
        <div class="download-badge">
          <i class="fa-solid fa-cloud-arrow-down" style="font-size:14px;"></i>
          <span>{{ book['download_count'] or 0 }} تحميل</span>
        </div>
      </div>

      <div class="book-meta">
        <p class="book-author">أجاثا كريستي</p>
        <h1 class="book-title">{{ book['title'] }}</h1>
        <div class="divider"></div>
        <p class="book-desc">{{ book['desc_text'] }}</p>

        <div class="actions">
          <a 
            href="{{ url_for('Library_Agatha.download_file', book_id=book['id']) }}"
            class="btn-download"
            onclick="updateCount({{ book['id'] }})"
          >
            <i class="fa-solid fa-download" style="font-size:14px;"></i>
            تحميل PDF ملكي
          </a>

          <a href="{{ url_for('Library_Agatha.agatha_christie') }}" class="btn-back">
            <i class="fa-solid fa-books" style="font-size:14px;"></i>
            روايات أخرى
          </a>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <a href="https://sadim.cloud">sadim.cloud</a>
  </footer>

  <script>
    function updateCount(bookId) {
      fetch(`/library/increment_download/${bookId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          const badge = document.querySelector('.download-badge span');
          if (badge) badge.textContent = data.new_count + ' تحميل';
        }
      })
      .catch(err => console.error(err));
    }
  </script>
</body>

</html>
