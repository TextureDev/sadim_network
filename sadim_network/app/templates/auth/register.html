<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة سديم - إنشاء حساب</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">



</head>

<body>

    <div class="container">

        <!-- Logo Section -->

        <div class="logo-section">

            <div class="logo-text">SADIMNETWORK</div>

            <div class="logo-subtitle">انشئ حسابك الآن</div>

            <p>الوقت الحالي : {{ current_time }}</p>

            <p id="liveClock" class="clock"></p>



        </div>

        <h2>صفحة إنشاء حساب</h2>

        <!-- Error Message (مخفية افتراضياً) -->

        <div class="error-message" id="errorMessage">

            الرجاء التأكد من صحة البيانات!

        </div>



        <form action="/register" method="POST" onsubmit="return validateForm()">

            <div class="mb-3">

                <label for="username" class="form-label">اسم المستخدم</label>

                <input type="text" class="form-control" id="username" name="username" placeholder="أدخل اسم المستخدم" required>

            </div>

            <div class="mb-3">

                <label for="email" class="form-label">البريد الإلكتروني</label>

                <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>

            </div>

            <div class="mb-3">

                <label for="name" class="form-label">الاسم الكامل</label>

                <input type="text" class="form-control" id="name" name="name" placeholder="أدخل اسمك الكامل" required>

            </div>



            <div class="mb-3">

                <label for="password" class="form-label">كلمة المرور</label>

                <input type="password" class="form-control" id="password" name="password" placeholder="أدخل كلمة المرور" required minlength="6">

            </div>



            <div class="mb-3">

                <label for="confirm" class="form-label">تأكيد كلمة المرور</label>

                <input type="password" class="form-control" id="confirm" name="confirm" placeholder="أعد إدخال كلمة المرور" required>

            </div>

           

            <button type="submit" class="btn btn-animated w-100">سجل الآن</button>


            <div class="divider">

                <span>أو</span>

            </div>



            <div class="text-center">

                هل لديك حساب؟ <a href="/login">تسجيل الدخول</a>

            </div>

        </form>

    </div>

    <!-- JavaScript للتحقق من النموذج -->
    <script>

        function validateForm() {

            const password = document.getElementById('password').value;

            const confirm = document.getElementById('confirm').value;

            const errorMessage = document.getElementById('errorMessage');



            if (password !== confirm) {

                errorMessage.textContent = 'كلمة المرور غير متطابقة!';

                errorMessage.style.display = 'block';

               

                setTimeout(() => {

                    errorMessage.style.display = 'none';

                }, 3000);

                return false;

            }



            if (password.length < 6) {

                errorMessage.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل!';

                errorMessage.style.display = 'block';

               

                setTimeout(() => {

                    errorMessage.style.display = 'none';

                }, 3000);

               

                return false;

            }



            return true;

        }



        // تأثير بصري عند الكتابة

        document.querySelectorAll('.form-control').forEach(input => {

            input.addEventListener('focus', function() {

                this.parentElement.style.transform = 'scale(1.02)';

                this.parentElement.style.transition = 'transform 0.3s ease';

            });



            input.addEventListener('blur', function() {

                this.parentElement.style.transform = 'scale(1)';

            });

        });

    </script>

  <script>

     function updateClock() {

         const now = new Date();

         const hour = now.getHours();

         let greeting;

         if (hour < 12) greeting = "صباح الخير 🌞";

         else if (hour < 18) greeting = "مساء الخير 🌞";

         else greeting = "مساء الخير 🌙";

 

         document.getElementById("liveClock").innerText =

             greeting + "، الوقت المحلي الآن: " + now.toLocaleTimeString();

     }

     setInterval(updateClock, 1000);

     updateClock();

  </script>
  <script>
   function validateForm() {
     const password = document.getElementById('password').value;
     const confirm  = document.getElementById('confirm').value;
     const email    = document.getElementById('email').value;
     const errorMessage = document.getElementById('errorMessage');
 
     function showError(msg) {
         errorMessage.textContent = msg;
         errorMessage.style.display = 'block';
         setTimeout(() => { errorMessage.style.display = 'none'; }, 3000);
     }
 
     // ── تحقق الإيميل ──
     if (!email.includes('@') || !email.includes('.')) {
         showError('البريد الإلكتروني غير صحيح!');
         return false;
     }
 
     // ── تطابق كلمة المرور ──
     if (password !== confirm) {
         showError('كلمة المرور غير متطابقة!');
         return false;
     }
 
     // ── طول كلمة المرور ──
     if (password.length < 6) {
         showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل!');
         return false;
     }
 
     return true;
    }
  </script>
</body>
</html>
