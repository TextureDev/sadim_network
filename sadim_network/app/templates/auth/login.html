<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">


  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loginn.css') }}">

  <title>شبكة سديم  - تسجيل الدخول</title>

</head>
<body>

  <div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-text">شبكة سديم</div>
      <div class="logo-subtitle">مرحباً بعودتك</div>
      <p>الوقت الحالي : {{ current_time }}</p>
      <p id="liveClock" class="clock"></p>
    </div>

    <h1>تسجيل الدخول</h1>

    <!-- رسالة خطأ (مخفية افتراضياً) -->
  {% if error %}
  <div class="error-message" style="display:block">
    {{ error }}
  </div>
  
  <div class="login-note">
    ملاحظة: في حال تعذّر تسجيل الدخول، قد يكون حسابك قيد التفعيل.
    يتم تفعيل الحسابات الجديدة خلال مدة لا تتجاوز <strong>24 ساعة</strong>.
  </div>
  {% endif %}




      <!--login -->
    <form action="/login" method="POST" onsubmit="return validateLogin()">
      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" placeholder="أدخل كلمة المرور" required minlength="6">
      </div>



      <button type="submit">تسجيل الدخول</button>
    </form>

    <div class="divider">
      <span>أو</span>
    </div>

    <div class="register-link">
      ليس لديك حساب؟ <a href="/register">أنشئ حسابًا جديدًا</a>
    </div>
    <div class="support-link">
      <a href="{{ url_for('main.support') }}">هل تحتاج إلى مساعدة؟ اتصل بالدعم</a>
    </div>
  </div>

  <!-- JavaScript للتحقق من النموذج -->
  <script>
    function validateLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');

      // التحقق من البريد الإلكتروني
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        errorMessage.textContent = 'الرجاء إدخال بريد إلكتروني صحيح!';
        errorMessage.style.display = 'block';
        
        setTimeout(() => {
          errorMessage.style.display = 'none';
        }, 3000);
        
        return false;
      }

      // التحقق من طول كلمة المرور
      if (password.length < 6) {
        errorMessage.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل!';
        errorMessage.style.display = 'block';
        
        setTimeout(() => {
          errorMessage.style.display = 'none';
        }, 3000);
        
        return false;
      }

      return true;
    }

    // تأثير بصري عند الكتابة في الحقول
    document.querySelectorAll('.form-group').forEach(group => {
      const input = group.querySelector('input');
      
      input.addEventListener('focus', function() {
        group.style.transform = 'scale(1.02)';
      });

      input.addEventListener('blur', function() {
        group.style.transform = 'scale(1)';
      });
    });

    // إظهار رسالة النجاح (اختياري - يمكن استخدامه من Flask)
    function showSuccessMessage() {
      const successMessage = document.

getElementById('successMessage');
      successMessage.style.display = 'block';
      
      setTimeout(() => {
        successMessage.style.display = 'none';
      }, 3000);
    }

    // إظهار رسالة الخطأ (اختياري - يمكن استخدامه من Flask)
    function showErrorMessage(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = message;
      errorMessage.style.display = 'block';
      
      setTimeout(() => {
        errorMessage.style.display = 'none';
      }, 3000);
    }
  </script>
  <script>
     function updateClock() {
         const now = new Date();
         const hour = now.getHours();
         let greeting;
  
         if (hour < 12) greeting = "صباح الخير 🌞";
         else if (hour < 18) greeting = "مساء الخير 🌞";
         else greeting = "مساء الخير 🌙";
  
         document.getElementById("liveClock").innerText =
             greeting + "، الوقت المحلي الآن: " + now.toLocaleTimeString();
     }
     setInterval(updateClock, 1000);
     updateClock();
  </script>

</body>
</html>
